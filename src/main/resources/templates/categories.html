<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapil Traders - Product Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #1a252f; }
        .sidebar .nav-link { color: #ffffff; transition: background 0.3s; }
        .sidebar .nav-link.active { background-color: #007bff; }
        .sidebar .nav-item:hover { background-color: #2c3e50; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .category-card { cursor: pointer; }
        .category-image { height: 200px; object-fit: cover; border-radius: 10px 10px 0 0; }
        .btn-primary { background-color: #007bff; border: none; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #0056b3; transform: scale(1.05); }
        .alert { border-radius: 10px; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column flex-shrink-0 p-3">
        <a th:href="@{/}" class="navbar-brand text-white mb-3 animate__animated animate__fadeInDown">Kapil Traders</a>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/}" th:classappend="${currentURI == '/'} ? 'active' : ''" class="nav-link">
                    <i class="fas fa-home me-2"></i>Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/categories}" th:classappend="${currentURI == '/categories'} ? 'active' : ''" class="nav-link">
                    <i class="fas fa-th-large me-2"></i>Categories
                </a>
            </li>
            <li>
                <a th:href="@{/products}" th:classappend="${currentURI == '/products'} ? 'active' : ''" class="nav-link">
                    <i class="fas fa-box me-2"></i>Products
                </a>
            </li>
            <li>
                <a th:href="@{/transfers}" th:classappend="${currentURI == '/transfers'} ? 'active' : ''" class="nav-link">
                    <i class="fas fa-truck me-2"></i>Transfers
                </a>
            </li>
            <li>
                <a th:href="@{/reports}" th:classappend="${currentURI == '/reports'} ? 'active' : ''" class="nav-link">
                    <i class="fas fa-chart-line me-2"></i>Reports
                </a>
            </li>
            <li>
                <a th:href="@{/barcode-scan}" th:classappend="${currentURI == '/barcode-scan'} ? 'active' : ''" class="nav-link">
                    <i class="fas fa-barcode me-2"></i>Scan
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        <h1 class="mb-4 animate__animated animate__fadeInUp">Product Categories</h1>
        <p class="text-muted animate__animated animate__fadeInUp animate__delay-1s">Select a category to add products or manage existing ones.</p>

        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success animate__animated animate__fadeInUp animate__delay-1s" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
        </div>

        <div th:if="${error}" class="alert alert-danger animate__animated animate__fadeInUp animate__delay-1s" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Category Cards -->
        <div class="row">
            <div class="col-md-4 mb-4" th:each="category : ${categories}">
                <div class="card category-card animate__animated animate__fadeInUp"
                     th:onclick="'window.location.href=\'/products/add/category/' + ${category.id} + '\''">
                    <img th:src="${category.imageUrl}" th:alt="${category.name}" class="category-image"
                         th:onerror="'this.src=\'/images/default-product.jpg\''">
                    <div class="card-body text-center">
                        <h5 class="card-title" th:text="${category.name}">Category Name</h5>
                        <p class="card-text text-muted" th:text="${category.description}">Description</p>
                        <p class="card-text"><small class="text-muted" th:text="${category.brand}">Brand</small></p>
                        <button class="btn btn-primary">Add Products</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Category Button -->
        <div class="text-center mt-4">
            <a th:href="@{/categories/add}" class="btn btn-success btn-lg">
                <i class="fas fa-plus-circle me-2"></i>Add New Category
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
