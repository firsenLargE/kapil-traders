<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapil Traders - Add Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #1a252f; }
        .sidebar .nav-link { color: #ffffff; transition: background 0.3s; }
        .sidebar .nav-item:hover { background-color: #2c3e50; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border: none; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #0056b3; transform: scale(1.05); }
        .image-upload-area { 
            border: 2px dashed #dee2e6; 
            border-radius: 10px; 
            padding: 30px; 
            text-align: center; 
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }
        .image-upload-area:hover { 
            border-color: #007bff; 
            background-color: #e3f2fd; 
        }
        .image-upload-area.dragover { 
            border-color: #28a745; 
            background-color: #d4edda; 
        }
        .image-preview { 
            max-width: 300px; 
            max-height: 200px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 10px auto;
            display: none;
        }
        .upload-icon { font-size: 3rem; color: #6c757d; margin-bottom: 15px; }
        .file-info { margin-top: 10px; font-size: 0.9em; color: #6c757d; }
        .validation-error { color: #dc3545; font-size: 0.9em; margin-top: 5px; }
        .validation-success { color: #28a745; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column flex-shrink-0 p-3">
        <a th:href="@{/}" class="navbar-brand text-white mb-3 animate__animated animate__fadeInDown">Kapil Traders</a>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/}" class="nav-link">
                    <i class="fas fa-home me-2"></i>Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/categories}" class="nav-link active" aria-current="page">
                    <i class="fas fa-th-large me-2"></i>Categories
                </a>
            </li>
            <li>
                <a th:href="@{/products}" class="nav-link">
                    <i class="fas fa-box me-2"></i>Products
                </a>
            </li>
            <li>
                <a th:href="@{/transfers}" class="nav-link">
                    <i class="fas fa-truck me-2"></i>Transfers
                </a>
            </li>
            <li>
                <a th:href="@{/reports}" class="nav-link">
                    <i class="fas fa-chart-line me-2"></i>Reports
                </a>
            </li>
            <li>
                <a th:href="@{/barcode-scan}" class="nav-link">
                    <i class="fas fa-barcode me-2"></i>Scan
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        <h1 class="mb-4 animate__animated animate__fadeInUp">Add New Category</h1>
        <p class="text-muted animate__animated animate__fadeInUp animate__delay-1s">Create a new product category with picture card.</p>

        <!-- Add Category Form -->
        <div class="card animate__animated animate__fadeInUp animate__delay-2s">
            <div class="card-body">
                <form th:action="@{/categories/add}" th:object="${category}" method="post" enctype="multipart/form-data" id="categoryForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label">Category Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required placeholder="e.g., Coke, Wai Wai">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="brand" class="form-label">Brand</label>
                                <input type="text" class="form-control" id="brand" th:field="*{brand}" required placeholder="e.g., Coca-Cola, Chaudhary Group">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="3"
                                  placeholder="Enter category description..."></textarea>
                    </div>

                    <!-- Image Upload Section -->
                    <div class="mb-4">
                        <label class="form-label">Category Image</label>
                        <div class="image-upload-area" id="imageUploadArea">
                            <i class="fas fa-cloud-upload-alt upload-icon"></i>
                            <h5>Upload Category Image</h5>
                            <p class="text-muted">Drag & drop an image here or click to browse</p>
                            <p class="text-muted small">Recommended: 400x300px, Max 2MB, JPG/PNG</p>
                            <input type="file" id="imageFile" name="imageFile" accept="image/*" style="display: none;">
                            <button type="button" class="btn btn-outline-primary" onclick="document.getElementById('imageFile').click()">
                                <i class="fas fa-upload me-2"></i>Choose File
                            </button>
                        </div>
                        
                        <!-- Image Preview -->
                        <div class="text-center" id="imagePreviewContainer" style="display: none;">
                            <img id="imagePreview" class="image-preview" alt="Preview">
                            <div class="mt-2">
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeImage()">
                                    <i class="fas fa-trash me-1"></i>Remove Image
                                </button>
                            </div>
                        </div>
                        
                        <!-- Validation Messages -->
                        <div id="imageValidation" class="mt-2"></div>
                        
                        <!-- Hidden field for image URL -->
                        <input type="hidden" id="imageUrl" th:field="*{imageUrl}">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/categories}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary animate__animated animate__pulse animate__infinite" id="submitBtn">
                            <i class="fas fa-save me-2"></i>Save Category
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
<script>
let selectedFile = null;

// File input change handler
document.getElementById('imageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        handleImageSelection(file);
    }
});

// Drag and drop functionality
const uploadArea = document.getElementById('imageUploadArea');

uploadArea.addEventListener('dragover', function(e) {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', function(e) {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', function(e) {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
        handleImageSelection(file);
    }
});

function handleImageSelection(file) {
    selectedFile = file;
    
    // Validate file
    const validation = validateImage(file);
    if (!validation.isValid) {
        showValidationError(validation.message);
        return;
    }
    
    // Show preview
    const reader = new FileReader();
    reader.onload = function(e) {
        const preview = document.getElementById('imagePreview');
        preview.src = e.target.result;
        preview.style.display = 'block';
        document.getElementById('imagePreviewContainer').style.display = 'block';
        document.getElementById('imageUploadArea').style.display = 'none';
        
        // Set the image URL for form submission
        document.getElementById('imageUrl').value = e.target.result;
        
        showValidationSuccess('Image selected successfully!');
    };
    reader.readAsDataURL(file);
}

function validateImage(file) {
    const maxSize = 2 * 1024 * 1024; // 2MB
    const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
    
    if (!allowedTypes.includes(file.type)) {
        return { isValid: false, message: 'Please select a valid image file (JPG, PNG, or WebP)' };
    }
    
    if (file.size > maxSize) {
        return { isValid: false, message: 'Image size must be less than 2MB' };
    }
    
    return { isValid: true, message: 'Image is valid' };
}

function removeImage() {
    selectedFile = null;
    document.getElementById('imageFile').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('imagePreviewContainer').style.display = 'none';
    document.getElementById('imageUploadArea').style.display = 'block';
    document.getElementById('imageUrl').value = '';
    document.getElementById('imageValidation').innerHTML = '';
}

function showValidationError(message) {
    const validationDiv = document.getElementById('imageValidation');
    validationDiv.innerHTML = `<div class="validation-error"><i class="fas fa-exclamation-circle me-1"></i>${message}</div>`;
}

function showValidationSuccess(message) {
    const validationDiv = document.getElementById('imageValidation');
    validationDiv.innerHTML = `<div class="validation-success"><i class="fas fa-check-circle me-1"></i>${message}</div>`;
}

// Form submission
document.getElementById('categoryForm').addEventListener('submit', function(e) {
    const imageUrl = document.getElementById('imageUrl').value;
    if (!imageUrl) {
        e.preventDefault();
        showValidationError('Please select a category image');
        return;
    }
});
</script>
</body>
</html>
