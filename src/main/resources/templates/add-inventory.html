<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapil Traders - Add Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #1a252f; }
        .sidebar .nav-link { color: #ffffff; transition: background 0.3s; }
        .sidebar .nav-item:hover { background-color: #2c3e50; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border: none; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #0056b3; transform: scale(1.05); }
        .product-info { background-color: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .readonly-field { background-color: #f8f9fa; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column flex-shrink-0 p-3">
        <a th:href="@{/}" class="navbar-brand text-white mb-3 animate__animated animate__fadeInDown">Kapil Traders</a>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/}" class="nav-link">
                    <i class="fas fa-home me-2"></i>Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/categories}" class="nav-link">
                    <i class="fas fa-th-large me-2"></i>Categories
                </a>
            </li>
            <li>
                <a th:href="@{/products}" class="nav-link">
                    <i class="fas fa-box me-2"></i>Products
                </a>
            </li>
            <li>
                <a th:href="@{/transfers}" class="nav-link">
                    <i class="fas fa-truck me-2"></i>Transfers
                </a>
            </li>
            <li>
                <a th:href="@{/reports}" class="nav-link">
                    <i class="fas fa-chart-line me-2"></i>Reports
                </a>
            </li>
            <li>
                <a th:href="@{/barcode-scan}" class="nav-link">
                    <i class="fas fa-barcode me-2"></i>Scan
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        <h1 class="mb-4 animate__animated animate__fadeInUp">Add Inventory</h1>
        <p class="text-muted animate__animated animate__fadeInUp animate__delay-1s">Add more inventory for the selected product.</p>

        <!-- Product Info -->
        <div class="product-info animate__animated animate__fadeInUp animate__delay-1s" th:if="${existingProduct}">
            <div class="row">
                <div class="col-md-2">
                    <img th:src="${existingProduct.imageUrl}" th:alt="${existingProduct.name}" 
                         class="img-fluid rounded" style="max-height: 80px;"
                         th:onerror="'this.src=\'/images/default-product.jpg\''">
                </div>
                <div class="col-md-10">
                    <h5><i class="fas fa-info-circle me-2"></i>Product: <span th:text="${existingProduct.name}" class="fw-bold"></span></h5>
                    <p class="mb-1 text-muted">
                        <span th:text="${existingProduct.category}"></span> • 
                        <span th:text="${existingProduct.variant}"></span> • 
                        Current Stock: <span th:text="${existingProduct.quantity}" class="fw-bold"></span> units
                    </p>
                    <p class="mb-0 text-muted">
                        Buy: NPR <span th:text="${existingProduct.price}"></span> • 
                        Sell: NPR <span th:text="${existingProduct.sellingRate}"></span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Add Inventory Form -->
        <div class="card animate__animated animate__fadeInUp animate__delay-2s">
            <div class="card-body">
                <form th:action="@{/products/add/inventory/{productId}(productId=${existingProduct.id})}" th:object="${product}" method="post">
                    
                    <!-- Read-only Product Details -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label">Product Name</label>
                                <input type="text" class="form-control readonly-field" id="name" th:field="*{name}" readonly>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="variant" class="form-label">Variant/Size</label>
                                <input type="text" class="form-control readonly-field" id="variant" th:field="*{variant}" readonly>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="price" class="form-label">Buying Price (NPR)</label>
                                <input type="number" step="0.01" class="form-control readonly-field" id="price" th:field="*{price}" readonly>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="sellingRate" class="form-label">Selling Rate (NPR)</label>
                                <input type="number" step="0.01" class="form-control readonly-field" id="sellingRate" th:field="*{sellingRate}" readonly>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="supplier" class="form-label">Supplier</label>
                                <input type="text" class="form-control readonly-field" id="supplier" th:field="*{supplier}" readonly>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <input type="text" class="form-control readonly-field" id="description" th:field="*{description}" readonly>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">

                    <!-- Editable Inventory Details -->
                    <h5 class="mb-3"><i class="fas fa-plus-circle me-2"></i>New Inventory Details</h5>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="quantity" class="form-label">Quantity to Add</label>
                                <input type="number" class="form-control" id="quantity" th:field="*{quantity}" required min="1">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="barcode" class="form-label">Barcode (Optional)</label>
                                <input type="text" class="form-control" id="barcode" th:field="*{barcode}" placeholder="Scan or enter barcode">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="buyingDate" class="form-label">Buying Date</label>
                                <input type="date" class="form-control" id="buyingDate" th:field="*{buyingDate}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="expirationDate" class="form-label">Expiration Date</label>
                                <input type="date" class="form-control" id="expirationDate" th:field="*{expirationDate}" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/products/add}" class="btn btn-secondary">Back to Products</a>
                        <button type="submit" class="btn btn-primary animate__animated animate__pulse animate__infinite">Add Inventory</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
